name: Deploy dashboard portal to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          cat > config.js <<'EOF'
          export const pageMeta = {
            lastUpdated: "March 2026",
            dataSource: "Tableau dashboards"
          };

          export const dashboardURLs = {
            fall2024: "${{ secrets.FALL2024_TABLEAU_URL }}",
            spring2025: "${{ secrets.SPRING2025_TABLEAU_URL }}",
            fall2025: "${{ secrets.FALL2025_TABLEAU_URL }}",
            spring2026: "${{ secrets.SPRING2026_TABLEAU_URL }}"
          };
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4